name: Build and Upload Nerves Artifact

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      MIX_DEPS_PATH: ${{ github.workspace }}/deps
      MIX_BUILD_PATH: ${{ github.workspace }}/_build
      NERVES_DL_DIR: ${{ github.workspace }}/.nerves/dl

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag and VERSION
        shell: bash
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          tag="${RELEASE_TAG#v}"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION ($version) does not match release tag (${RELEASE_TAG})"
            exit 1
          fi

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.13.0

      - name: Ensure SSH directory exists for Docker bind mount
        run: mkdir -p ~/.ssh

      - name: Ensure NERVES download directory is writable in Docker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$MIX_DEPS_PATH" "$MIX_BUILD_PATH"
          mkdir -p "$NERVES_DL_DIR"
          chmod -R a+rwX "$MIX_DEPS_PATH" "$MIX_BUILD_PATH"
          chmod -R a+rwX "$NERVES_DL_DIR"

      - name: Fetch dependencies
        run: devbox run -- mix deps.get

      - name: Build Nerves artifact
        run: devbox run -- mix nerves.artifact --path artifacts

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          tag_name: ${{ env.RELEASE_TAG }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
